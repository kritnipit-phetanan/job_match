services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobmatcher_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-jobmatcher}
      POSTGRES_USER: ${DB_USER:-jobmatcher}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobmatcher_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobmatcher}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
