# ============================================================
# JobMatcher — Automated Scraping & ETL Pipeline
# รัน scraper + ETL ทุกคืน แล้ว upsert เข้า Supabase
# ============================================================
name: Nightly Scrape & ETL

on:
  # รันอัตโนมัติทุกวันเริ่มต้นที่ 01:45 UTC (08:45 เวลาไทย)
  # (จากนั้นจะมีการใช้ sleep เพื่อสุ่มดีเลย์ไปถึง 14:30)
  schedule:
    - cron: '45 1 * * *'

  # รัน manual ได้จาก GitHub UI
  workflow_dispatch:

jobs:
  scrape-and-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ---------------------------------------------------------
      # 1. Checkout code
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 1.5. Random Delay
      # ---------------------------------------------------------
      - name: "Sleep for a random amount of time"
        run: |
          # สุ่มเลขตั้งแต่วินาทีที่ 0 ถึง 600 (เท่ากับ 10 นาที) 
          # เพื่อป้องกันไม่ให้กินเวลา execution นานเกิน 1 ชั่วโมงจนโดนบังคับจบ
          DELAY=$((RANDOM % 600))
          echo "Sleeping for $DELAY seconds before starting pipeline..."
          sleep $DELAY

      # ---------------------------------------------------------
      # 2. Setup Python
      # ---------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ---------------------------------------------------------
      # 3. Install Playwright (Chromium only)
      # ---------------------------------------------------------
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ---------------------------------------------------------
      # 4. Phase 1 — Scrape job listings → upsert เข้า DB
      #    Retry สูงสุด 2 ครั้ง
      # ---------------------------------------------------------
      - name: "Phase 1: Scrape job listings"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBSDB_COOKIES: ${{ secrets.JOBSDB_COOKIES }}
          HEADLESS: "true"
        run: |
          for attempt in 1 2; do
            echo "=== Phase 1: Attempt $attempt ==="
            if python cloud_scrape_jobs.py; then
              echo "✅ Phase 1 succeeded on attempt $attempt"
              break
            else
              echo "❌ Phase 1 failed on attempt $attempt"
              if [ $attempt -lt 2 ]; then
                echo "⏳ Waiting 60s before retry..."
                sleep 60
              else
                echo "⚠️ Phase 1 failed after 2 attempts — continuing to Phase 2 & ETL"
              fi
            fi
          done

      # ---------------------------------------------------------
      # 4.5. Upload debug screenshot (ถ้ามี)
      # ---------------------------------------------------------
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          if-no-files-found: ignore
          retention-days: 7

      # ---------------------------------------------------------
      # 5. Phase 2 — Scrape JD details → update description
      # ---------------------------------------------------------
      - name: "Phase 2: Scrape job descriptions"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBSDB_COOKIES: ${{ secrets.JOBSDB_COOKIES }}
          HEADLESS: "true"
        run: python cloud_scrape_details.py

      # ---------------------------------------------------------
      # 6. ETL — Extract skills + Embed → upsert เข้า DB
      # ---------------------------------------------------------
      - name: "ETL: Extract skills & embeddings"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m etl.load_to_db

      # ---------------------------------------------------------
      # 7. Repair — รีเซ็ตงานที่มีปัญหา (skills=[], JD='Not Found')
      #    เพื่อให้รอบถัดไปทำใหม่อัตโนมัติ
      # ---------------------------------------------------------
      - name: "Repair: Reset broken jobs"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python repair_jobs.py fix

      # ---------------------------------------------------------
      # 8. Deactivate — ปิดงานที่ไม่ได้อัปเดตเกิน 30 วัน
      #    ไม่ลบข้อมูล แค่ set is_active = false
      # ---------------------------------------------------------
      - name: "Deactivate stale jobs (30+ days)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python deactivate_stale_jobs.py
